<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Netflix Clone</title>
</head>

<body>
    <div class="hero-section">
        <div class="hero-nav-bar">
            <div class="hero-nav-bar-left">
                <img src="Assests/netflix-logo-final.png">
            </div>
            <div class="hero-nav-bar-right">
                <select name="language">
                    <option value="english">🌐 English</option>
                    <option value="hindi">हिन्दी</option>
                </select>
                <button>Sign In</button>
            </div>
        </div>

        <div class="hero-main">
            <div class="main-header">
                Unlimited movies,<br>
                shows, and more
            </div>
            <div class="sub-header">
                Starts at ₹149. Cancel at any time.
            </div>
            <div class="sub-header-sub">
                Ready to watch? Enter your email to create or restart your membership.
            </div>
            <div class="sign-up">
                <input type="text" class="email-input" placeholder="Email address">
                <button class="get-started">Get Started ➡️
                </button>
            </div>
        </div>
    </div>

</body>

</html>
